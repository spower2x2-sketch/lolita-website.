<script>

/* SCROLL REVEAL */

const observer =
new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.style.opacity = 1;

entry.target.style.transform =
'translateY(0px)';

}

});

});

document.querySelectorAll(
'section,.card,.service,img,.booking-box'
)

.forEach(el=>{

el.style.opacity = 0;

el.style.transform =
'translateY(80px)';

el.style.transition =
'1s ease';

observer.observe(el);

});

/* PROGRESS BAR */

window.addEventListener('scroll',()=>{

const scroll =
window.scrollY;

const height =
document.body.scrollHeight -
window.innerHeight;

const progress =
(scroll / height) * 100;

document.querySelector('.progress-bar')
.style.width = progress + '%';

})

/* BOOKING FORM */

document
.getElementById('bookingForm')

.addEventListener('submit',function(e){

e.preventDefault()

const name =
document.getElementById('name').value

const date =
document.getElementById('date').value

const service =
document.getElementById('service').value

const notes =
document.getElementById('notes').value

const message =

`Hello Loaa Makeup Artist

Name: ${name}

Date: ${date}

Service: ${service}

Notes: ${notes}`

window.open(

`https://wa.me/201505978924?text=${encodeURIComponent(message)}`

)

})

/* CURSOR GLOW */

const glow =
document.createElement('div')

document.body.appendChild(glow)

glow.style.cssText = `

position:fixed;

width:300px;
height:300px;

border-radius:50%;

background:
radial-gradient(circle,
rgba(255,77,141,.14),
transparent 70%
);

pointer-events:none;

transform:translate(-50%,-50%);

z-index:9999;

mix-blend-mode:screen;

`

document.addEventListener('mousemove',(e)=>{

glow.style.left =
e.clientX + 'px'

glow.style.top =
e.clientY + 'px'

})

</script>
